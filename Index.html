<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatHawk</title>
    <link rel="stylesheet" href="CSS/Style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav>
    <h1>ThreatHawk</h1>
</nav>

<section class="dashboard">

    <div class="upload-box">

        <label for="logFile" class="file-label">
        📁 Choose Log File
        </label>

        <input type="file" id="logFile" accept=".txt,.log,.csv">

        <span id="fileName">No file selected</span>

        <button id="uploadBtn">Analyze Log</button>

    </div>

    <div class="stats">

        <div class="card">
            <h3>Total Events</h3>
            <p id="totalEvents">0</p>
        </div>

        <div class="card">
            <h3>Critical Alerts</h3>
            <p id="criticalAlerts">0</p>
        </div>

        <div class="card">
            <h3>Suspicious IPs</h3>
            <p id="suspiciousIPs">0</p>
        </div>

        <div class="card">
            <h3>Failed Logins</h3>
            <p id="failedLogins">0</p>
        </div>
        <div class="card">
            <h3>Threat Score</h3>
            <p id="threatScore">0</p>
        </div>
    </div>

    <div class="panels">

        <div class="chart-panel">
            <canvas id="eventChart"></canvas>
        </div>

        <div class="alert-panel" id="alertPanel">
            No alerts yet.
        </div>

    </div>

    <div class="ioc-panel">
        <h2>Detected IOCs</h2>
        <div id="iocList">No IOCs detected.</div>
    </div>

    <div class="table-panel">
        <div class="table-controls">

            <input
                type="text"
                id="searchInput"
                placeholder="Search events..."
            >

            <select id="severityFilter">
                <option value="All">All Severities</option>
                <option value="Info">Info</option>
                <option value="Warning">Warning</option>
            </select>

        </div>

        <table>

            <thead>
                <tr>
                    <th>Time</th>
                    <th>Severity</th>
                    <th>Event</th>
                    <th>IP</th>
                </tr>
            </thead>

            <tbody id="eventTable">

            </tbody>

        </table>

    </div>

</section>

<script src="js/app.js"></script>

</body>
</html>
